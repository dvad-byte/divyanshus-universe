<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:        #0d0d14;
      --bg-mid:    #13131f;
      --gold:      #c9a84c;
      --gold-dim:  #7a6130;
      --white:     #e8e4dc;
      --muted:     #6b6878;
      --glow:      rgba(201, 168, 76, 0.07);
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      background-image: url('bg.jpg');
      background-size: cover;
      background-position: center 30%;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* Overlay — stronger in the middle band where text sits */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(8, 8, 16, 0.35) 0%,
        rgba(8, 8, 16, 0.55) 35%,
        rgba(8, 8, 16, 0.62) 55%,
        rgba(8, 8, 16, 0.72) 100%
      );
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      display: none;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 4rem 2rem;
      max-width: 680px;
      width: 100%;
      /* Align with sun-to-figure axis */
      margin-top: -6vh;
      margin-left: 4vw;
    }

    /* Eyebrow */
    .eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 1.6rem;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.2s;
    }

    /* Title */
    h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(2.4rem, 6vw, 3.8rem);
      font-weight: 400;
      line-height: 1.15;
      color: #ffffff;
      letter-spacing: -0.01em;
      text-shadow: 0 2px 24px rgba(0,0,0,0.6), 0 1px 4px rgba(0,0,0,0.5);
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.45s;
    }

    /* Tagline */
    .tagline {
      font-family: 'Inter', sans-serif;
      font-style: italic;
      font-size: clamp(0.95rem, 2.2vw, 1.15rem);
      color: #e8c86a;
      margin-top: 0.9rem;
      letter-spacing: 0.01em;
      text-shadow: 0 1px 12px rgba(0,0,0,0.7);
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.7s;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
      margin: 1.4rem auto;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.9s;
    }

    /* Sections nav */
    nav {
      opacity: 0;
      animation: fadeUp 1s ease forwards 1.1s;
    }

    nav ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
      align-items: center;
    }

    nav ul li a {
      display: inline-block;
      font-family: 'Inter', sans-serif;
      font-size: clamp(0.88rem, 2vw, 0.98rem);
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(232, 228, 220, 0.85);
      text-decoration: none;
      padding: 0.35rem 1.2rem;
      position: relative;
      text-shadow: 0 1px 8px rgba(0,0,0,0.8);
      transition: color 0.5s ease, letter-spacing 0.5s ease;
    }

    /* Warm underlighting — the bansuri note */
    nav ul li a::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 1px;
      background: var(--gold);
      transition: width 0.5s ease;
      opacity: 0.6;
    }

    nav ul li a:hover {
      color: var(--white);
      letter-spacing: 0.2em;
    }

    nav ul li a:hover::before {
      width: 60%;
    }

    /* Footer */
    footer {
      position: relative;
      z-index: 1;
      margin-top: 5rem;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 1s ease forwards 1.5s;
      padding-bottom: 2.5rem;
    }

    footer span {
      color: var(--gold-dim);
    }

    /* Animation */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .eyebrow, h1, .tagline, .divider, nav, footer {
        animation: none;
        opacity: 1;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 3rem 1.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Divyanshu's Universe</h1>

    <p class="tagline">Life Is The Universe Experiencing Itself!</p>

    <div class="divider"></div>

    <nav aria-label="Sections">

        <li><a href="humanities.html">Humanities</a></li>
        <li><a href="physics.html">Physics</a></li>
        
      </ul>
    </nav>
  </div>



</body>
</html>
