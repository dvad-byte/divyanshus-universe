<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Light of the Ancient — Divyanshu's Universe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Inter:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d14;
      --gold:     #c9a84c;
      --gold-dim: #7a6130;
      --white:    #e8e4dc;
      --muted:    #6b6878;
    }

    html, body { min-height: 100%; }

    body {
      background-color: var(--bg);
      background-image: url('writing-bg.jpg');
      background-size: cover;
      background-position: center 30%;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      padding: 5rem 2rem 7rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(6, 5, 10, 0.68) 0%,
        rgba(6, 5, 10, 0.55) 40%,
        rgba(6, 5, 10, 0.80) 100%
      );
      pointer-events: none;
      z-index: 0;
    }

    body::after { display: none; }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 620px;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold-dim);
      text-decoration: none;
      margin-bottom: 3.5rem;
      transition: color 0.4s ease;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.1s;
    }
    .back:hover { color: var(--gold); }
    .back::before { content: '←'; font-size: 0.85rem; }

    .label {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 1.4rem;
      text-shadow: 0 1px 8px rgba(0,0,0,0.9);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.25s;
    }

    h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 400;
      color: #ffffff;
      letter-spacing: -0.01em;
      line-height: 1.2;
      text-shadow: 0 2px 20px rgba(0,0,0,0.8), 0 1px 4px rgba(0,0,0,0.6);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.35s;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
      margin: 2.2rem 0;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.5s;
    }

    .poem {
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.65s;
    }

    .poem p {
      font-family: 'Inter', sans-serif;
      font-style: italic;
      font-size: clamp(1.05rem, 2.5vw, 1.25rem);
      line-height: 2.1;
      color: rgba(232, 228, 220, 0.92);
      text-shadow: 0 1px 10px rgba(0,0,0,0.8);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .back, .label, h1, .divider, .poem { animation: none; opacity: 1; }
    }

    @media (max-width: 480px) { body { padding: 3.5rem 1.5rem 5rem; } }
  </style>
</head>
<body>
  <div class="container">

    <a href="literature.html" class="back">Writing</a>

    <p class="label">Poetry</p>

    <h1>Light of the Ancient</h1>

    <div class="divider"></div>

    <div class="poem">
      <p>
        Your magnitude, dear Cosmos, is so reverential.<br>
        I gaze deeply at you, yet can only know your past.
      </p>
    </div>

  </div>
</body>
</html>
