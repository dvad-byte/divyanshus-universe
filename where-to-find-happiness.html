<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Where to Find Happiness</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 640px;
      text-align: center;
    }

    .line {
      font-size: 1.6rem;
      line-height: 2.2;
      font-style: italic;
      color: #f0ece4;
      letter-spacing: 0.02em;
    }

    .author {
      margin-top: 3rem;
      font-size: 0.85rem;
      color: #666;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .date {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="line">Happiness, quite literally,<br>is as simple as breathing.</p>
    <p class="author">— Divyanshu</p>
    <p class="date">June 2026</p>
  </div>
</body>
</html>
