<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing — Divyanshu's Universe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Inter:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:       #0d0d14;
      --gold:     #c9a84c;
      --gold-dim: #7a6130;
      --white:    #e8e4dc;
      --muted:    #6b6878;
    }

    html, body {
      min-height: 100%;
    }

    body {
      background-color: var(--bg);
      background-image: url('writing-bg.jpg');
      background-size: cover;
      background-position: center 30%;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      padding: 5rem 2rem 6rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(6, 5, 10, 0.55) 0%,
        rgba(6, 5, 10, 0.42) 40%,
        rgba(6, 5, 10, 0.72) 100%
      );
      pointer-events: none;
      z-index: 0;
    }

    body::after { display: none; }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 620px;
    }

    /* Back link */
    .back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #e8c86a;
      text-decoration: none;
      margin-bottom: 3.5rem;
      transition: color 0.4s ease;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.1s;
    }

    .back:hover {
      color: var(--gold);
    }

    .back::before {
      content: '←';
      font-size: 0.85rem;
    }

    /* Page heading */
    h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      color: #ffffff;
      letter-spacing: -0.01em;
      line-height: 1.15;
      text-shadow: 0 2px 20px rgba(0,0,0,0.7), 0 1px 4px rgba(0,0,0,0.5);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.25s;
    }

    /* Subtitle */
    .subtitle {
      font-family: 'Inter', sans-serif;
      font-style: italic;
      font-size: 0.95rem;
      color: #e8c86a;
      margin-top: 0.7rem;
      text-shadow: 0 1px 10px rgba(0,0,0,0.9);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.4s;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
      margin: 2.5rem 0;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.55s;
    }

    /* Works list */
    ul.works {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.7s;
    }

    ul.works li {
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }

    ul.works li:first-child {
      border-top: 1px solid rgba(255,255,255,0.12);
    }

    ul.works li a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 0;
      font-size: clamp(0.88rem, 2vw, 0.98rem);
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(232, 228, 220, 0.85);
      text-shadow: 0 1px 8px rgba(0,0,0,0.8);
      text-decoration: none;
      transition: color 0.5s ease, letter-spacing 0.5s ease;
      gap: 1rem;
    }

        ul.works li a:hover {
      color: #ffffff;
      letter-spacing: 0.2em;
    }

    ul.works li a .arrow {
      font-size: 0.75rem;
      color: #e8c86a;
      opacity: 0;
      transition: opacity 0.4s ease, color 0.4s ease;
      flex-shrink: 0;
    }

    ul.works li a:hover .arrow {
      opacity: 1;
      color: var(--gold);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .back, h1, .subtitle, .divider, ul.works {
        animation: none;
        opacity: 1;
      }
    }

    @media (max-width: 480px) {
      body { padding: 3.5rem 1.5rem 5rem; }
    }
  </style>
</head>

  </ul>

  </div>
</body>
</html>
